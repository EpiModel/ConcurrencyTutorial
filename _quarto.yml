project:
  type: website
  output-dir: _site
  render:
    - index.qmd

website:
  title: "Concurrency Tutorial"
  description: "How relational concurrency does (and does not) shape HIV and STI epidemics"
  navbar:
    background: dark
    pinned: true
    right:
      - text: "EpiModel"
        href: https://www.epimodel.org
      - text: "Training"
        href: https://epimodel.github.io/sismid/
      - text: "Interactive app"
        href: https://epimodel.github.io/concurrency.sim
      - icon: github
        href: https://github.com/EpiModel/ConcurrencyTutorial
        aria-label: GitHub
  page-footer:
    border: false
    background: dark
    left:
      - text: "© 2025 EpiModel Research Lab, Emory University"
    center:
      - text: "Interactive app"
        href: https://epimodel.github.io/concurrency.sim
        target: "_blank"
      - text: "EpiModel"
        href: https://www.epimodel.org
        target: "_blank"
    right:
      - icon: github
        href: https://github.com/EpiModel/ConcurrencyTutorial
        target: "_blank"

format:
  html:
    theme:
      - cosmo
      - custom.scss
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    link-external-newwindow: true
